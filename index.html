<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Aim Trainer (WASD Movement)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 5px;
        }
        #score { color: #00ffcc; }
        #current-diff { color: #ff0055; }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #00ffcc;
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* Menu Screen */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #instructions {
            text-align: center;
            color: white;
            background: #1a1a1f;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
            max-width: 400px;
        }

        h1 { margin-top: 0; color: #00ffcc; letter-spacing: 2px; }
        
        .btn {
            background: #242629;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #333;
            border-color: #00ffcc;
        }
        .btn-start {
            background: #00ffcc;
            color: #111;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 15px;
            border: none;
        }
        .btn-start:hover {
            background: #00ccaa;
        }
        
        .active-diff {
            background: #ff0055 !important;
            border-color: #ff0055 !important;
            color: white !important;
        }

        .setting-section {
            margin: 20px 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        Score: <span id="score">0</span><br>
        Mode: <span id="current-diff">Normal</span>
    </div>
    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h1>3D AIM TRAINER</h1>
            
            <div class="setting-section">
                <label>SELECT DIFFICULTY</label>
                <button class="btn" id="btn-easy" onclick="setDifficulty('easy')">Easy</button>
                <button class="btn active-diff" id="btn-normal" onclick="setDifficulty('normal')">Normal</button>
                <button class="btn" id="btn-hard" onclick="setDifficulty('hard')">Hard</button>
            </div>

            <div class="setting-section">
                <button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()">🖥️ Toggle Fullscreen</button>
            </div>

            <button class="btn btn-start" onclick="startGame()">CLICK TO PLAY</button>
            <p style="font-size: 13px; color: #aaa; margin-top: 15px;">
                <b>WASD</b> to Move | <b>Mouse</b> to Look | <b>ESC</b> to Pause
            </p>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let targets = [];
        let score = 0;
        const maxTargets = 5; // Bumped up slightly for movement tracking
        
        // Camera Look variables
        let yaw = 0;
        let pitch = 0;
        const mouseSensitivity = 0.002;

        // Movement variables
        const moveState = { forward: false, backward: false, left: false, right: false };
        const moveSpeed = 0.12; 
        const playerRadius = 1.0; 

        // Difficulty Configurations
        const diffSettings = {
            easy: { sizeMin: 0.9, sizeMax: 1.3, speed: 0.002, label: 'Easy' },
            normal: { sizeMin: 0.5, sizeMax: 0.8, speed: 0.005, label: 'Normal' },
            hard: { sizeMin: 0.25, sizeMax: 0.4, speed: 0.012, label: 'Hard' }
        };
        let currentDifficulty = 'normal';

        const scoreDisplay = document.getElementById('score');
        const diffDisplay = document.getElementById('current-diff');
        const blocker = document.getElementById('blocker');

        function setDifficulty(mode) {
            currentDifficulty = mode;
            diffDisplay.innerText = diffSettings[mode].label;
            
            document.querySelectorAll('.setting-section .btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById(`btn-${mode}`).classList.add('active-diff');

            if(scene) {
                targets.forEach(t => scene.remove(t));
                targets = [];
                for (let i = 0; i < maxTargets; i++) spawnTarget();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { alert(err.message); });
            } else {
                document.exitFullscreen();
            }
        }

        function startGame() {
            document.body.requestPointerLock();
        }

        document.addEventListener('pointerlockchange', () => {
            blocker.style.display = (document.pointerLockElement === document.body) ? 'none' : 'flex';
        });

        // --- Mouse Camera Controls ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body) return;

            yaw -= e.movementX * mouseSensitivity;
            pitch -= e.movementY * mouseSensitivity;
            pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        });

        // --- Keyboard Movement Listeners ---
        const onKeyDown = (e) => {
            if (document.pointerLockElement !== document.body) return;
            switch (e.code) {
                case 'KeyW': case 'ArrowUp':    moveState.forward = true; break;
                case 'KeyA': case 'ArrowLeft':  moveState.left = true; break;
                case 'KeyS': case 'ArrowDown':  moveState.backward = true; break;
                case 'KeyD': case 'ArrowRight': moveState.right = true; break;
            }
        };

        const onKeyUp = (e) => {
            switch (e.code) {
                case 'KeyW': case 'ArrowUp':    moveState.forward = false; break;
                case 'KeyA': case 'ArrowLeft':  moveState.left = false; break;
                case 'KeyS': case 'ArrowDown':  moveState.backward = false; break;
                case 'KeyD': case 'ArrowRight': moveState.right = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- Game Setup ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111116);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            // Spawn player in the middle of the back of the arena
            camera.position.set(0, 1.6, 15); 

            renderer = new THREE.WebGLRenderer({ antialias: false, precision: "mediump" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); 
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            // Floor Grid (Boundaries: X: -25 to 25, Z: -25 to 25)
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x222225 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Front wall (where targets spawn)
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1f });
            const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(50, 25), wallMat);
            frontWall.position.set(0, 12.5, -25);
            scene.add(frontWall);

            for (let i = 0; i < maxTargets; i++) {
                spawnTarget();
            }

            window.addEventListener('click', onShoot);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function spawnTarget() {
            const config = diffSettings[currentDifficulty];
            const radius = config.sizeMin + Math.random() * (config.sizeMax - config.sizeMin);
            
            const geometry = new THREE.SphereGeometry(radius, 12, 12);
            const material = new THREE.MeshLambertMaterial({ color: 0xff0055 });
            const target = new THREE.Mesh(geometry, material);

            const x = (Math.random() - 0.5) * 40; // Wider spawn map for moving players
            const y = 1 + Math.random() * 8;
            const z = -15 - Math.random() * 8; // Varied depths

            target.position.set(x, y, z);
            scene.add(target);
            targets.push(target);
        }

        // --- Smooth WASD Processing Engine ---
        function handleMovement() {
            if (document.pointerLockElement !== document.body) return;

            // Calculate forward/backward and strafe vectors based on camera direction
            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const sideVector = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            // Ground movement only (lock Y axis to eliminate flying)
            forwardVector.y = 0;
            sideVector.y = 0;
            forwardVector.normalize();
            sideVector.normalize();

            const direction = new THREE.Vector3();

            if (moveState.forward) direction.add(forwardVector);
            if (moveState.backward) direction.sub(forwardVector);
            if (moveState.right) direction.add(sideVector);
            if (moveState.left) direction.sub(sideVector);

            if (direction.lengthSq() > 0) {
                direction.normalize().multiplyScalar(moveSpeed);
                camera.position.add(direction);
            }

            // High-Performance Invisible Map Collisions (Keep player inside 50x50 map)
            const mapLimit = 24.5; 
            if (camera.position.x > mapLimit) camera.position.x = mapLimit;
            if (camera.position.x < -mapLimit) camera.position.x = -mapLimit;
            if (camera.position.z > mapLimit) camera.position.z = mapLimit;
            // Prevent walking past the target wall
            if (camera.position.z < -20) camera.position.z = -20; 
        }

        function onShoot() {
            if (document.pointerLockElement !== document.body) return;

            const raycaster = new THREE.Raycaster();
            const centerScreen = new THREE.Vector2(0, 0); 
            raycaster.setFromCamera(centerScreen, camera);

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitTarget = intersects[0].object;
                scene.remove(hitTarget);
                targets = targets.filter(t => t !== hitTarget);

                if(currentDifficulty === 'easy') score += 50;
                if(currentDifficulty === 'normal') score += 100;
                if(currentDifficulty === 'hard') score += 250;
                
                scoreDisplay.innerText = score;
                spawnTarget();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Process WASD Input smoothly every frame
            handleMovement();
            
            // Floating animation target speed based on difficulty choice
            const config = diffSettings[currentDifficulty];
            const time = Date.now() * (config.speed * 10);
            
            targets.forEach((target, index) => {
                target.position.y += Math.sin(time + index) * (config.speed * 1.5);
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
