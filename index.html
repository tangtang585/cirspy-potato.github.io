<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Aim Trainer (Advanced Low-Spec)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 5px;
        }
        #score { color: #00ffcc; }
        #current-diff { color: #ff0055; }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #00ffcc;
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* Menu Screen */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #instructions {
            text-align: center;
            color: white;
            background: #1a1a1f;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
            max-width: 400px;
        }

        h1 { margin-top: 0; color: #00ffcc; letter-spacing: 2px; }
        
        /* Interactive Buttons */
        .btn {
            background: #242629;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #333;
            border-color: #00ffcc;
        }
        .btn-start {
            background: #00ffcc;
            color: #111;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 15px;
            border: none;
        }
        .btn-start:hover {
            background: #00ccaa;
        }
        
        /* Active Difficulty Highlight */
        .active-diff {
            background: #ff0055 !important;
            border-color: #ff0055 !important;
            color: white !important;
        }

        .setting-section {
            margin: 20px 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        Score: <span id="score">0</span><br>
        Mode: <span id="current-diff">Normal</span>
    </div>
    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h1>3D AIM TRAINER</h1>
            
            <div class="setting-section">
                <label>SELECT DIFFICULTY</label>
                <button class="btn" id="btn-easy" onclick="setDifficulty('easy')">Easy</button>
                <button class="btn active-diff" id="btn-normal" onclick="setDifficulty('normal')">Normal</button>
                <button class="btn" id="btn-hard" onclick="setDifficulty('hard')">Hard</button>
            </div>

            <div class="setting-section">
                <button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()">🖥️ Toggle Fullscreen</button>
            </div>

            <button class="btn btn-start" onclick="startGame()">CLICK TO PLAY</button>
            <p style="font-size: 12px; color: #666; margin-top: 15px;">Press ESC to pause/change settings</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let targets = [];
        let score = 0;
        const maxTargets = 4;
        
        let yaw = 0;
        let pitch = 0;
        const mouseSensitivity = 0.002;

        // Difficulty Configurations
        const diffSettings = {
            easy: { sizeMin: 0.9, sizeMax: 1.3, speed: 0.002, label: 'Easy' },
            normal: { sizeMin: 0.5, sizeMax: 0.8, speed: 0.005, label: 'Normal' },
            hard: { sizeMin: 0.25, sizeMax: 0.4, speed: 0.012, label: 'Hard' }
        };
        let currentDifficulty = 'normal';

        const scoreDisplay = document.getElementById('score');
        const diffDisplay = document.getElementById('current-diff');
        const blocker = document.getElementById('blocker');

        // --- Difficulty Logic ---
        function setDifficulty(mode) {
            currentDifficulty = mode;
            diffDisplay.innerText = diffSettings[mode].label;
            
            // Update UI buttons active state
            document.querySelectorAll('.setting-section .btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById(`btn-${mode}`).classList.add('active-diff');

            // Clear old targets and spawn new ones matching difficulty if game is initialized
            if(scene) {
                targets.forEach(t => scene.remove(t));
                targets = [];
                for (let i = 0; i < maxTargets; i++) spawnTarget();
            }
        }

        // --- Fullscreen Logic ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error enabling fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- Game Controls ---
        function startGame() {
            document.body.requestPointerLock();
        }

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                blocker.style.display = 'none';
            } else {
                blocker.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body) return;

            yaw -= e.movementX * mouseSensitivity;
            pitch -= e.movementY * mouseSensitivity;
            pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        });

        // --- Core Engine Setup ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111116);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            // Celeron Optimization settings
            renderer = new THREE.WebGLRenderer({ antialias: false, precision: "mediump" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); 
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x222225 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const wallMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1f });
            const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(50, 25), wallMat);
            frontWall.position.set(0, 12.5, -20);
            scene.add(frontWall);

            // Initialize targets
            for (let i = 0; i < maxTargets; i++) {
                spawnTarget();
            }

            window.addEventListener('click', onShoot);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function spawnTarget() {
            const config = diffSettings[currentDifficulty];
            // Setup target scale based on configuration chosen
            const radius = config.sizeMin + Math.random() * (config.sizeMax - config.sizeMin);
            
            const geometry = new THREE.SphereGeometry(radius, 12, 12);
            const material = new THREE.MeshLambertMaterial({ color: 0xff0055 });
            const target = new THREE.Mesh(geometry, material);

            const x = (Math.random() - 0.5) * 24;
            const y = 1 + Math.random() * 7;
            const z = -16 - Math.random() * 3;

            target.position.set(x, y, z);
            scene.add(target);
            targets.push(target);
        }

        function onShoot() {
            if (document.pointerLockElement !== document.body) return;

            const raycaster = new THREE.Raycaster();
            const centerScreen = new THREE.Vector2(0, 0); 
            raycaster.setFromCamera(centerScreen, camera);

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitTarget = intersects[0].object;
                scene.remove(hitTarget);
                targets = targets.filter(t => t !== hitTarget);

                // Harder targets yield slightly more points!
                if(currentDifficulty === 'easy') score += 50;
                if(currentDifficulty === 'normal') score += 100;
                if(currentDifficulty === 'hard') score += 250;
                
                scoreDisplay.innerText = score;
                spawnTarget();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const config = diffSettings[currentDifficulty];
            const time = Date.now() * (config.speed * 10); // Speed scales up with difficulty
            
            targets.forEach((target, index) => {
                target.position.y += Math.sin(time + index) * (config.speed * 1.5);
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
